services:
  runpod-panel:
    build: .
    container_name: runpod-panel
    restart: unless-stopped
    environment:
      RUNPOD_API_KEY: ${RUNPOD_API_KEY}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
    # On this project's private default bridge only. No published port, no traefik label,
    # so Traefik never routes to it directly. Reachable ONLY by oauth2-proxy (same bridge).
    # Isolated from your other /docker projects (separate bridges) and from the internet —
    # but still has OUTBOUND internet (normal bridge) to reach the RunPod API.

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: runpod-panel-auth
    restart: unless-stopped
    command:
      - --provider=google
      - --email-domain=gmail.com
      - --authenticated-emails-file=/etc/oauth2/emails
      - --upstream=http://runpod-panel:8000
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --cookie-secure=true
      - --set-xauthrequest=true          # passes X-Auth-Request-Email/User to the panel
      - --pass-access-token=false
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://${PANEL_HOST}/oauth2/callback
    volumes:
      - ./emails:/etc/oauth2/emails:ro
    # Same pattern as your open-webui / litellm: host-mode Traefik discovers this via the
    # Docker socket and routes to it on this project's default bridge. websecure + letsencrypt.
    labels:
      - traefik.enable=true
      - traefik.http.routers.runpod-panel.rule=Host(`${PANEL_HOST}`)
      - traefik.http.routers.runpod-panel.entrypoints=websecure
      - traefik.http.routers.runpod-panel.tls.certresolver=letsencrypt
      - traefik.http.services.runpod-panel.loadbalancer.server.port=4180
